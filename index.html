<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>코딩 동아리 신청 · 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Gmarket+Sans:wght@700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #f4f6fb;
      --surface:  #ffffff;
      --border:   #dde2ef;
      --border2:  #c8d0e5;
      --primary:  #3d5afe;
      --primary-h:#1a3de0;
      --primary-s:rgba(61,90,254,0.1);

      --text:     #1a1d2e;
      --sub:      #4a5068;
      --muted:    #8891aa;
      --chip-bg:  #eef0f8;
      --chip-sel: #3d5afe;
      --shadow:   0 2px 16px rgba(61,90,254,0.08);
      --shadow-h: 0 6px 28px rgba(61,90,254,0.16);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      background-image:
        radial-gradient(circle at 10% 10%, rgba(61,90,254,0.07) 0%, transparent 55%),
        radial-gradient(circle at 90% 90%, rgba(14,168,122,0.07) 0%, transparent 55%);
      color: var(--text);
      font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .wrap {
      max-width: 680px;
      margin: 0 auto;
      padding: 56px 20px 80px;
    }

    /* ── HEADER ── */
    header {
      text-align: center;
      margin-bottom: 44px;
      animation: fadeDown .65s cubic-bezier(.22,1,.36,1) both;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--primary-s);
      color: var(--primary);
      border: 1px solid rgba(61,90,254,0.22);
      border-radius: 99px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      padding: 5px 14px;
      margin-bottom: 18px;
    }
    .pill .dot { width:6px; height:6px; border-radius:50%; background:var(--primary); animation: blink 1.8s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    h1 {
      font-family: 'Gmarket Sans', 'Black Han Sans', sans-serif;
      font-size: clamp(1.9rem, 5.5vw, 3rem);
      font-weight: 700;
      line-height: 1.12;
      letter-spacing: -1.5px;
      color: var(--text);
      margin-bottom: 10px;
    }
    h1 em {
      font-style: normal;
      background: linear-gradient(120deg, var(--primary) 0%, #7b5eff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .desc {
      font-size: 0.95rem;
      color: var(--sub);
      font-weight: 400;
      line-height: 1.6;
    }

    /* ── CARD ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 34px 36px;
      margin-bottom: 18px;
      box-shadow: var(--shadow);
      animation: fadeUp .65s cubic-bezier(.22,1,.36,1) both;
    }
    .card:nth-of-type(1){ animation-delay:.05s }
    .card:nth-of-type(2){ animation-delay:.12s }
    .card:nth-of-type(3){ animation-delay:.19s }
    .card:nth-of-type(4){ animation-delay:.26s }

    .card-head {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
    }
    .card-icon {
      width: 34px; height: 34px;
      border-radius: 9px;
      display: grid;
      place-items: center;
      font-size: 1rem;
      flex-shrink: 0;
    }
    .ci-blue   { background: rgba(61,90,254,0.12); }
    .ci-violet { background: rgba(108,61,232,0.12); }
    .ci-green  { background: rgba(14,168,122,0.12); }
    .ci-orange { background: rgba(251,140,0,0.12); }

    .card-head-text { flex: 1; }
    .card-title {
      font-size: 0.88rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.2px;
    }
    .card-sub {
      font-size: 0.76rem;
      color: var(--muted);
      margin-top: 2px;
    }

    /* ── FIELDS ── */
    .fields {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    .full { grid-column: 1/-1; }

    .field label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--sub);
      letter-spacing: 0.4px;
      margin-bottom: 7px;
    }
    .field input,
    .field textarea {
      width: 100%;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 11px 14px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.93rem;
      font-weight: 400;
      outline: none;
      transition: border-color .2s, box-shadow .2s, background .2s;
      line-height: 1.55;
    }
    .field input:focus,
    .field textarea:focus {
      border-color: var(--primary);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(61,90,254,0.1);
    }
    .field input::placeholder,
    .field textarea::placeholder { color: var(--muted); font-size: 0.88rem; }
    .field textarea { resize: vertical; min-height: 100px; }

    /* ── LANGUAGE CHIPS ── */
    .lang-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .lang-chip {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 7px 14px;
      border-radius: 99px;
      border: 1.5px solid var(--border);
      background: var(--chip-bg);
      color: var(--sub);
      font-family: inherit;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .18s ease;
      user-select: none;
    }
    .lang-chip:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-s); }
    .lang-chip.selected {
      border-color: var(--primary);
      background: var(--primary);
      color: #fff;
    }
    .lang-chip .check { display: none; font-size: 0.75rem; }
    .lang-chip.selected .check { display: inline; }

    /* ── SUBMIT ── */
    .submit-wrap {
      animation: fadeUp .65s .28s cubic-bezier(.22,1,.36,1) both;
    }
    .submit-btn {
      width: 100%;
      padding: 15px;
      border-radius: 13px;
      border: none;
      background: linear-gradient(130deg, #3d5afe 0%, #1a3de0 100%);
      color: #fff;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(61,90,254,0.35);
      transition: opacity .2s, transform .15s, box-shadow .2s;
      position: relative;
      overflow: hidden;
    }
    .submit-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
      transform: translateX(-100%);
      transition: transform .4s;
    }
    .submit-btn:hover::after { transform: translateX(100%); }
    .submit-btn:hover  { opacity:.92; transform:translateY(-1px); box-shadow:0 8px 28px rgba(61,90,254,0.42); }
    .submit-btn:active { transform:translateY(1px); }
    .submit-btn:disabled { opacity:.5; cursor:not-allowed; transform:none; }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(70px);
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 13px 22px;
      font-size: 0.88rem;
      font-weight: 600;
      white-space: nowrap;
      z-index: 200;
      pointer-events: none;
      box-shadow: 0 8px 32px rgba(0,0,0,0.1);
      transition: transform .35s cubic-bezier(.34,1.56,.64,1);
      color: var(--text);
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.ok  { border-color: rgba(14,168,122,.5); color: #0a7a5a; }
    .toast.err { border-color: rgba(229,57,53,.5);  color: #c62828; }

    /* ── DIVIDER ── */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 20px 0;
    }

    /* ── KEYFRAMES ── */
    @keyframes fadeDown { from{opacity:0;transform:translateY(-16px)} to{opacity:1;transform:none} }
    @keyframes fadeUp   { from{opacity:0;transform:translateY(16px)}  to{opacity:1;transform:none} }

    /* ── RESPONSIVE ── */
    @media(max-width:520px){
      .card { padding:24px 18px; }
      .fields { grid-template-columns:1fr; }
      .full { grid-column:auto; }
      .tab-grid { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="pill"><span class="dot"></span>2026 모집</div>
    <h1>코딩 동아리<br><em>부원 모집 신청</em></h1>
    <p class="desc">아래 내용을 작성하고 제출 버튼을 눌러주세요.</p>
  </header>

  <form id="regForm" novalidate>

    <!-- ① 기본 정보 -->
    <div class="card">
      <div class="card-head">
        <div class="card-icon ci-blue">👤</div>
        <div class="card-head-text">
          <div class="card-title">기본 정보</div>
          <div class="card-sub">학번 · 이름 · 연락처</div>
        </div>
      </div>
      <div class="fields">
        <div class="field">
          <label for="studentId">학번</label>
          <input type="text" id="studentId" placeholder="예) 10101" required maxlength="10"/>
        </div>
        <div class="field">
          <label for="uname">이름</label>
          <input type="text" id="uname" placeholder="홍길동" required maxlength="20"/>
        </div>
        <div class="field full">
          <label for="phone">전화번호</label>
          <input type="tel" id="phone" placeholder="010-0000-0000" required maxlength="13"/>
        </div>
        <div class="field full">
          <label for="email">학교 이메일</label>
          <input type="email" id="email" placeholder="student@school.ac.kr" required/>
        </div>
      </div>
    </div>

    <!-- ③ 코딩 언어 -->
    <div class="card">
      <div class="card-head">
        <div class="card-icon ci-orange">💻</div>
        <div class="card-head-text">
          <div class="card-title">다뤄본 코딩 언어</div>
          <div class="card-sub">경험 있는 언어를 모두 선택하세요 (없어도 괜찮아요)</div>
        </div>
      </div>
      <div class="lang-grid" id="langGrid">
        <!-- JS로 생성 -->
      </div>
    </div>

    <!-- ④ 활동 계획 -->
    <div class="card">
      <div class="card-head">
        <div class="card-icon ci-green">✏️</div>
        <div class="card-head-text">
          <div class="card-title">하고 싶은 활동</div>
          <div class="card-sub">동아리에서 해보고 싶은 것을 자유롭게 써주세요</div>
        </div>
      </div>
      <div class="field">
        <label for="activity">활동 계획 및 목표</label>
        <textarea id="activity" placeholder="예) 게임을 직접 만들어 보고 싶습니다. 특히 Unity를 활용한 2D 플랫포머 게임 개발에 도전하고 싶습니다..." rows="5"></textarea>
      </div>
    </div>

    <!-- 제출 -->
    <div class="submit-wrap">
      <button type="submit" class="submit-btn" id="submitBtn">신청서 제출하기 →</button>
    </div>

  </form>
</div>

<div class="toast" id="toast"></div>

<script>
  /* ── 언어 칩 생성 ── */
  const LANGS = [
    'C', 'C++', 'C#', 'Java', 'Python', 'JavaScript',
    'TypeScript', 'Kotlin', 'Swift', 'Rust', 'Go',
    'HTML/CSS', 'SQL', 'R', 'MATLAB', 'Arduino(C++)', '없음'
  ];
  const grid = document.getElementById('langGrid');
  LANGS.forEach(lang => {
    const chip = document.createElement('button');
    chip.type = 'button';
    chip.className = 'lang-chip';
    chip.dataset.lang = lang;
    chip.innerHTML = `<span class="check">✓</span>${lang}`;
    chip.addEventListener('click', () => {
      if (lang === '없음') {
        // 없음 선택 시 나머지 해제
        grid.querySelectorAll('.lang-chip').forEach(c => c.classList.remove('selected'));
        chip.classList.add('selected');
      } else {
        // 다른 언어 선택 시 '없음' 해제
        const noneChip = grid.querySelector('[data-lang="없음"]');
        if (noneChip) noneChip.classList.remove('selected');
        chip.classList.toggle('selected');
      }
    });
    grid.appendChild(chip);
  });

  /* ── 전화번호 하이픈 ── */
  document.getElementById('phone').addEventListener('input', e => {
    let v = e.target.value.replace(/\D/g, '');
    if      (v.length <= 3) { }
    else if (v.length <= 7) v = v.slice(0,3) + '-' + v.slice(3);
    else                    v = v.slice(0,3) + '-' + v.slice(3,7) + '-' + v.slice(7,11);
    e.target.value = v;
  });

  /* ── 토스트 ── */
  function toast(msg, type) {
    const el = document.getElementById('toast');
    el.textContent = (type === 'ok' ? '✅  ' : '❌  ') + msg;
    el.className = 'toast ' + type + ' show';
    setTimeout(() => el.classList.remove('show'), 3800);
  }

  const SHEET_URL = 'https://script.google.com/macros/s/AKfycbxl8C5Cqse56sAvSoiOhDsYO8cnO3_eK_iCpdgM1KBXNO1sUvU9hLbWwwphcZpFlywB/exec';

  document.getElementById('regForm').addEventListener('submit', async e => {
    e.preventDefault();

    const sid      = document.getElementById('studentId').value.trim();
    const name     = document.getElementById('uname').value.trim();
    const phone    = document.getElementById('phone').value.trim();
    const email    = document.getElementById('email').value.trim();
    const activity = document.getElementById('activity').value.trim();
    const langs    = [...document.querySelectorAll('.lang-chip.selected')].map(c => c.dataset.lang).join(', ') || '선택 없음';

    if (!sid || !name || !phone || !email) { toast('기본 정보를 모두 입력해주세요.', 'err'); return; }
    if (!/^010-\d{4}-\d{4}$/.test(phone)) { toast('전화번호 형식을 확인해주세요. (010-0000-0000)', 'err'); return; }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { toast('이메일 형식을 확인해주세요.', 'err'); return; }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true; btn.textContent = '제출 중…';

    try {
      await fetch(SHEET_URL, {
        method: 'POST', mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          studentId: sid, name, phone, email,
          languages: langs,
          activity,
          submittedAt: new Date().toLocaleString('ko-KR', { timeZone: 'Asia/Seoul' })
        })
      });
      toast('신청이 완료되었습니다! 🎉', 'ok');
      e.target.reset();
      document.querySelectorAll('.lang-chip').forEach(c => c.classList.remove('selected'));
    } catch {
      toast('오류가 발생했습니다. 잠시 후 다시 시도해주세요.', 'err');
    } finally {
      btn.disabled = false; btn.textContent = '신청서 제출하기 →';
    }
  });
</script>
</body>
</html>
